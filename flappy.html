<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3D Flappy Bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; }
  canvas { display: block; }

  .overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 10; pointer-events: auto;
  }
  .overlay.hidden { display: none; }

  #startScreen {
    background: linear-gradient(180deg, rgba(135,206,250,0.85) 0%, rgba(100,180,120,0.85) 100%);
  }
  #gameOverScreen {
    background: rgba(0,0,0,0.6);
  }

  .title {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: clamp(36px, 10vw, 72px);
    color: #fff; text-shadow: 3px 3px 0 #c0392b, -1px -1px 0 #e74c3c;
    letter-spacing: 4px; margin-bottom: 12px; text-align: center;
  }
  .subtitle {
    font-family: Arial, sans-serif;
    font-size: clamp(14px, 4vw, 22px);
    color: #fff; opacity: 0.8; margin-bottom: 40px; text-align: center;
  }

  .btn {
    background: linear-gradient(180deg, #f39c12, #e67e22);
    border: 4px solid #d35400; border-radius: 16px;
    color: #fff; font-family: 'Arial Black', Arial, sans-serif;
    font-size: clamp(20px, 6vw, 36px); padding: 16px 48px;
    cursor: pointer; box-shadow: 0 6px 0 #c0392b, 0 12px 24px rgba(0,0,0,0.3);
    transition: transform 0.1s; text-align: center;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #c0392b, 0 4px 12px rgba(0,0,0,0.3); }

  #hud {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    z-index: 5; display: flex; gap: 24px;
    font-family: 'Arial Black', Arial, sans-serif;
    color: #fff; text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
  }
  #hud.hidden { display: none; }
  .score-box {
    background: rgba(0,0,0,0.35); border-radius: 12px; padding: 8px 20px;
    font-size: clamp(16px, 4vw, 28px);
  }
  .score-label { font-size: 10px; opacity: 0.7; display: block; text-align: center; }

  .go-title {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: clamp(32px, 9vw, 64px);
    color: #e74c3c; text-shadow: 2px 2px 0 #000; margin-bottom: 8px;
  }
  .go-score {
    font-family: Arial, sans-serif; font-size: clamp(18px, 5vw, 32px);
    color: #fff; margin-bottom: 6px;
  }
  .go-best {
    font-family: Arial, sans-serif; font-size: clamp(14px, 4vw, 22px);
    color: #f1c40f; margin-bottom: 36px;
  }
</style>
</head>
<body>

<!-- Start Screen -->
<div id="startScreen" class="overlay">
  <div class="title">FLAPPY<br>BIRD 3D</div>
  <div class="subtitle">Tap or press Space to fly!</div>
  <button class="btn" id="playBtn">PLAY</button>
</div>

<!-- HUD -->
<div id="hud" class="hidden">
  <div class="score-box"><span class="score-label">SCORE</span><span id="currentScore">0</span></div>
  <div class="score-box"><span class="score-label">BEST</span><span id="bestScore">0</span></div>
</div>

<!-- Game Over Screen -->
<div id="gameOverScreen" class="overlay hidden">
  <div class="go-title">GAME OVER</div>
  <div class="go-score" id="goScore">Score: 0</div>
  <div class="go-best" id="goBest">Best: 0</div>
  <button class="btn" id="retryBtn">RETRY</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
(function() {
  // ── Constants ──
  const GRAVITY = -28;
  const FLAP_VEL = 9.5;
  const PIPE_SPEED = 6;
  const PIPE_GAP = 4.2;
  const PIPE_SPACING_X = 7;
  const PIPE_RADIUS = 0.8;
  const BIRD_SIZE = 0.55;
  const GROUND_Y = -5;
  const CEILING_Y = 12;
  const PIPE_COUNT = 6;

  // ── DOM refs ──
  const startScreen = document.getElementById('startScreen');
  const gameOverScreen = document.getElementById('gameOverScreen');
  const hud = document.getElementById('hud');
  const currentScoreEl = document.getElementById('currentScore');
  const bestScoreEl = document.getElementById('bestScore');
  const goScoreEl = document.getElementById('goScore');
  const goBestEl = document.getElementById('goBest');

  // ── State ──
  let state = 'start'; // start | playing | dead
  let score = 0;
  let bestScore = parseInt(localStorage.getItem('flappy3d_best') || '0', 10);
  let birdVelY = 0;
  let pipeTimer = 0;

  // ── Three.js Setup ──
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  // ── Lighting ──
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xfff5e1, 1.2);
  dirLight.position.set(10, 20, 10);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 1024;
  dirLight.shadow.mapSize.height = 1024;
  dirLight.shadow.camera.near = 0.5;
  dirLight.shadow.camera.far = 80;
  dirLight.shadow.camera.left = -30;
  dirLight.shadow.camera.right = 30;
  dirLight.shadow.camera.top = 30;
  dirLight.shadow.camera.bottom = -10;
  scene.add(dirLight);

  const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x556b2f, 0.4);
  scene.add(hemiLight);

  // ── Sky gradient background ──
  const skyCanvas = document.createElement('canvas');
  skyCanvas.width = 2; skyCanvas.height = 512;
  const skyCtx = skyCanvas.getContext('2d');
  const grad = skyCtx.createLinearGradient(0, 0, 0, 512);
  grad.addColorStop(0, '#4a90d9');
  grad.addColorStop(0.5, '#87ceeb');
  grad.addColorStop(0.85, '#b7e1a7');
  grad.addColorStop(1, '#6b8e4e');
  skyCtx.fillStyle = grad;
  skyCtx.fillRect(0, 0, 2, 512);
  const skyTexture = new THREE.CanvasTexture(skyCanvas);
  skyTexture.mapping = THREE.EquirectangularReflectionMapping;
  scene.background = skyTexture;

  // ── Ground plane ──
  const groundGeo = new THREE.PlaneGeometry(200, 20);
  const groundMat = new THREE.MeshLambertMaterial({ color: 0x6b8e4e });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.set(0, GROUND_Y + 0.05, 0);
  ground.receiveShadow = true;
  scene.add(ground);

  // ── Ground strip (brown dirt) ──
  const dirtGeo = new THREE.PlaneGeometry(200, 3);
  const dirtMat = new THREE.MeshLambertMaterial({ color: 0x8b6914 });
  const dirt = new THREE.Mesh(dirtGeo, dirtMat);
  dirt.rotation.x = -Math.PI / 2;
  dirt.position.set(0, GROUND_Y + 0.06, -8);
  scene.add(dirt);

  // ── Bird ──
  const birdGroup = new THREE.Group();

  // Body (sphere)
  const bodyGeo = new THREE.SphereGeometry(BIRD_SIZE, 16, 16);
  const bodyMat = new THREE.MeshPhongMaterial({ color: 0xf5c842, shininess: 80 });
  const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
  bodyMesh.castShadow = true;
  birdGroup.add(bodyMesh);

  // Belly (slightly forward + down)
  const bellyGeo = new THREE.SphereGeometry(BIRD_SIZE * 0.6, 12, 12);
  const bellyMat = new THREE.MeshPhongMaterial({ color: 0xfaebd7 });
  const bellyMesh = new THREE.Mesh(bellyGeo, bellyMat);
  bellyMesh.position.set(0.1, -0.2, 0.15);
  birdGroup.add(bellyMesh);

  // Eyes
  const eyeGeo = new THREE.SphereGeometry(BIRD_SIZE * 0.18, 8, 8);
  const eyeWhiteMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
  const eyeBlackMat = new THREE.MeshPhongMaterial({ color: 0x222222 });

  [-1, 1].forEach(side => {
    const eyeW = new THREE.Mesh(eyeGeo, eyeWhiteMat);
    eyeW.position.set(BIRD_SIZE * 0.5, BIRD_SIZE * 0.25, side * BIRD_SIZE * 0.55);
    birdGroup.add(eyeW);

    const pupilGeo = new THREE.SphereGeometry(BIRD_SIZE * 0.1, 6, 6);
    const pupil = new THREE.Mesh(pupilGeo, eyeBlackMat);
    pupil.position.set(BIRD_SIZE * 0.65, BIRD_SIZE * 0.25, side * BIRD_SIZE * 0.55);
    birdGroup.add(pupil);
  });

  // Beak
  const beakGeo = new THREE.ConeGeometry(BIRD_SIZE * 0.22, BIRD_SIZE * 0.6, 8);
  const beakMat = new THREE.MeshPhongMaterial({ color: 0xe67e22 });
  const beak = new THREE.Mesh(beakGeo, beakMat);
  beak.rotation.x = Math.PI / 2;
  beak.position.set(BIRD_SIZE * 0.9, -0.05, 0);
  birdGroup.add(beak);

  // Wing (simple flat ellipsoid)
  const wingShape = new THREE.Shape();
  wingShape.moveTo(0, 0);
  wingShape.quadraticCurveTo(0.5, 0.3, 0.9, 0);
  wingShape.quadraticCurveTo(0.5, -0.15, 0, 0);

  const wingGeo = new THREE.ExtrudeGeometry(wingShape, { depth: 0.08, bevelEnabled: false });
  const wingMat = new THREE.MeshPhongMaterial({ color: 0xe8b520 });

  const leftWing = new THREE.Mesh(wingGeo, wingMat);
  leftWing.position.set(-0.1, 0.15, BIRD_SIZE * 0.6);
  leftWing.rotation.y = -0.2;
  birdGroup.add(leftWing);

  const rightWing = new THREE.Mesh(wingGeo.clone(), wingMat);
  rightWing.position.set(-0.1, 0.15, -BIRD_SIZE * 0.6);
  rightWing.rotation.y = Math.PI + 0.2;
  birdGroup.add(rightWing);

  // Tail
  const tailGeo = new THREE.BoxGeometry(BIRD_SIZE * 0.3, BIRD_SIZE * 0.5, BIRD_SIZE * 0.1);
  const tailMat = new THREE.MeshPhongMaterial({ color: 0xd4a017 });
  const tail = new THREE.Mesh(tailGeo, tailMat);
  tail.position.set(-BIRD_SIZE * 0.8, BIRD_SIZE * 0.2, 0);
  birdGroup.add(tail);

  birdGroup.position.set(0, 3, 0);
  scene.add(birdGroup);

  // ── Pipes ──
  const pipes = [];
  const pipePool = [];

  function createPipePair() {
    const group = new THREE.Group();

    const gapY = GROUND_Y + 4 + Math.random() * (CEILING_Y - GROUND_Y - PIPE_GAP - 6);

    // Pipe material
    const pipeMat = new THREE.MeshPhongMaterial({ color: 0x2ecc40, shininess: 40 });
    const rimMat = new THREE.MeshPhongMaterial({ color: 0x27ae36 });

    // Bottom pipe
    const bHeight = gapY - GROUND_Y;
    const bGeo = new THREE.CylinderGeometry(PIPE_RADIUS, PIPE_RADIUS, Math.max(bHeight, 0.1), 16);
    const bPipe = new THREE.Mesh(bGeo, pipeMat);
    bPipe.position.y = GROUND_Y + bHeight / 2;
    bPipe.castShadow = true;
    group.add(bPipe);

    // Bottom rim
    const rimGeo = new THREE.CylinderGeometry(PIPE_RADIUS * 1.25, PIPE_RADIUS * 1.25, 0.3, 16);
    const bRim = new THREE.Mesh(rimGeo, rimMat);
    bRim.position.y = gapY - 0.15;
    group.add(bRim);

    // Top pipe
    const tHeight = CEILING_Y + 5 - (gapY + PIPE_GAP);
    const tGeo = new THREE.CylinderGeometry(PIPE_RADIUS, PIPE_RADIUS, Math.max(tHeight, 0.1), 16);
    const tPipe = new THREE.Mesh(tGeo, pipeMat);
    tPipe.position.y = gapY + PIPE_GAP + tHeight / 2;
    tPipe.castShadow = true;
    group.add(tPipe);

    // Top rim
    const tRim = new THREE.Mesh(rimGeo.clone(), rimMat);
    tRim.position.y = gapY + PIPE_GAP + 0.15;
    group.add(tRim);

    // Store metadata for collision/scoring
    group.userData = { gapY: gapY, scored: false };

    return group;
  }

  function spawnPipe(startX) {
    const pipe = createPipePair();
    pipe.position.x = startX || (pipes.length > 0 ? pipes[pipes.length - 1].position.x + PIPE_SPACING_X : 10);
    scene.add(pipe);
    pipes.push(pipe);
  }

  // ── Particles (score flash) ──
  const particles = [];
  function spawnParticle(x, y, z) {
    const geo = new THREE.SphereGeometry(0.12, 6, 6);
    const mat = new THREE.MeshBasicMaterial({ color: Math.random() > 0.5 ? 0xf1c40f : 0xffd700 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    scene.add(mesh);
    particles.push({
      mesh,
      vx: (Math.random() - 0.5) * 4,
      vy: Math.random() * 6 + 2,
      vz: (Math.random() - 0.5) * 4,
      life: 1
    });
  }

  // ── Camera setup ──
  camera.position.set(-3, 5, 12);
  camera.lookAt(0, 3, 0);

  // ── Resize ──
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ── Input ──
  function flap() {
    if (state === 'dead') return;
    if (state === 'start') startGame();
    if (state === 'playing') {
      birdVelY = FLAP_VEL;
      // Wing flap animation trigger
      wingFlapTime = 0.15;
    }
  }

  let wingFlapTime = 0;

  document.addEventListener('keydown', e => { if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); } });
  renderer.domElement.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });
  renderer.domElement.addEventListener('mousedown', e => { flap(); });

  document.getElementById('playBtn').addEventListener('click', e => { e.stopPropagation(); startGame(); });
  document.getElementById('retryBtn').addEventListener('click', e => { e.stopPropagation(); restartGame(); });

  // ── Game Flow ──
  function startGame() {
    state = 'playing';
    score = 0;
    birdVelY = FLAP_VEL;
    wingFlapTime = 0.15;

    // Remove old pipes
    pipes.forEach(p => scene.remove(p));
    pipes.length = 0;

    // Reset bird
    birdGroup.position.set(0, 3, 0);
    birdGroup.rotation.z = 0;

    // Spawn initial pipes
    for (let i = 0; i < PIPE_COUNT; i++) {
      spawnPipe(10 + i * PIPE_SPACING_X);
    }

    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
    hud.classList.remove('hidden');

    currentScoreEl.textContent = '0';
    bestScoreEl.textContent = bestScore;
  }

  function restartGame() {
    state = 'start'; // will flip to playing via startGame
    startGame();
  }

  function die() {
    state = 'dead';

    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('flappy3d_best', String(bestScore));
    }

    hud.classList.add('hidden');
    gameOverScreen.classList.remove('hidden');
    goScoreEl.textContent = 'Score: ' + score;
    goBestEl.textContent = 'Best: ' + bestScore;

    // Flash screen
    renderer.domElement.style.filter = 'brightness(2)';
    setTimeout(() => { renderer.domElement.style.filter = ''; }, 100);
  }

  // ── Collision ──
  function checkCollision() {
    const bx = birdGroup.position.x;
    const by = birdGroup.position.y;

    // Ground / ceiling
    if (by - BIRD_SIZE < GROUND_Y || by + BIRD_SIZE > CEILING_Y) return true;

    // Pipes
    for (const pipe of pipes) {
      const px = pipe.position.x;
      const gapY = pipe.userData.gapY;

      // Horizontal distance
      const dx = Math.abs(bx - px);
      if (dx < PIPE_RADIUS + BIRD_SIZE * 0.7) {
        // Check if in the gap
        if (by - BIRD_SIZE * 0.6 < gapY || by + BIRD_SIZE * 0.6 > gapY + PIPE_GAP) {
          return true;
        }
      }
    }

    return false;
  }

  // ── Game Loop ──
  let lastTime = performance.now();
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);

    const now = performance.now();
    const rawDt = (now - lastTime) / 1000;
    const dt = Math.min(rawDt, 0.05); // cap delta
    lastTime = now;

    if (state === 'playing') {
      // Gravity
      birdVelY += GRAVITY * dt;
      birdGroup.position.y += birdVelY * dt;

      // Bird rotation based on velocity
      const targetRotZ = THREE.MathUtils.clamp(birdVelY * 0.06, -1.2, 0.6);
      birdGroup.rotation.z += (targetRotZ - birdGroup.rotation.z) * 8 * dt;

      // Wing flap animation
      if (wingFlapTime > 0) {
        wingFlapTime -= dt;
        const wingAngle = Math.sin(wingFlapTime * 40) * 0.5;
        leftWing.rotation.x = wingAngle;
        rightWing.rotation.x = -wingAngle;
      } else {
        // Gentle idle flap
        const idle = Math.sin(now / 1000 * 3) * 0.15;
        leftWing.rotation.x = idle;
        rightWing.rotation.x = -idle;
      }

      // Move pipes toward bird (bird stays at x=0, world scrolls)
      for (const pipe of pipes) {
        pipe.position.x -= PIPE_SPEED * dt;
      }

      // Recycle off-screen pipes
      while (pipes.length > 0 && pipes[0].position.x < -5) {
        const old = pipes.shift();
        scene.remove(old);
        // Spawn new one at the end
        const lastX = pipes.length > 0 ? pipes[pipes.length - 1].position.x : 10;
        spawnPipe(lastX + PIPE_SPACING_X);
      }

      // Scoring
      for (const pipe of pipes) {
        if (!pipe.userData.scored && pipe.position.x < birdGroup.position.x) {
          pipe.userData.scored = true;
          score++;
          currentScoreEl.textContent = String(score);

          // Score particles
          for (let i = 0; i < 6; i++) {
            spawnParticle(birdGroup.position.x, birdGroup.position.y + BIRD_SIZE, birdGroup.position.z);
          }
        }
      }

      // Collision check
      if (checkCollision()) {
        die();
      }

      // Camera follow Y slightly
      camera.position.y += (birdGroup.position.y * 0.3 + 2 - camera.position.y) * 4 * dt;
      camera.lookAt(0, birdGroup.position.y * 0.5, 0);

    } else if (state === 'start') {
      // Idle bob
      birdGroup.position.y = 3 + Math.sin(now / 1000 * 2) * 0.3;
      birdGroup.rotation.z = Math.sin(now / 1000 * 1.5) * 0.05;

      const idle = Math.sin(now / 1000 * 3) * 0.25;
      leftWing.rotation.x = idle;
      rightWing.rotation.x = -idle;

      camera.position.y += (4 - camera.position.y) * dt * 2;
      camera.lookAt(0, 3, 0);

    } else if (state === 'dead') {
      // Fall to ground
      birdVelY += GRAVITY * dt;
      birdGroup.position.y += birdVelY * dt;
      if (birdGroup.position.y < GROUND_Y + BIRD_SIZE) {
        birdGroup.position.y = GROUND_Y + BIRD_SIZE;
        birdVelY = 0;
      }
      const targetRotZ = -1.2;
      birdGroup.rotation.z += (targetRotZ - birdGroup.rotation.z) * 5 * dt;

      camera.lookAt(0, birdGroup.position.y * 0.3, 0);
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.mesh.position.x += p.vx * dt;
      p.mesh.position.y += p.vy * dt;
      p.mesh.position.z += p.vz * dt;
      p.vy -= 12 * dt;
      p.life -= dt * 2;
      p.mesh.scale.setScalar(Math.max(p.life, 0));
      if (p.life <= 0) {
        scene.remove(p.mesh);
        particles.splice(i, 1);
      }
    }

    renderer.render(scene, camera);
  }

  animate();
})();
</script>
</body>
</html>
